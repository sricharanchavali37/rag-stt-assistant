<svg width="900" height="500" viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg" style="background:#121212;font-family:'DM Sans','Helvetica Neue',helvetica,arial,sans-serif;">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#4d4d4d" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
    <marker id="arrg" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#1ed760" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
  </defs>

  <!-- Section labels -->
  <text x="60" y="42" font-size="10" font-weight="700" fill="#1ed760" letter-spacing="2">PIPELINE ARCHITECTURE</text>
  <line x1="60" y1="50" x2="840" y2="50" stroke="#2a2a2a" stroke-width="0.5"/>

  <!-- OFFLINE label -->
  <text x="80" y="90" font-size="9" font-weight="700" fill="#555" letter-spacing="1.5">OFFLINE — ONE-TIME INGESTION</text>

  <!-- RUNTIME label -->
  <text x="460" y="90" font-size="9" font-weight="700" fill="#555" letter-spacing="1.5">RUNTIME — EVERY QUERY</text>

  <!-- ── OFFLINE BOXES ── -->
  <!-- PDF Docs -->
  <rect x="60" y="104" width="130" height="64" rx="8" fill="#181818" stroke="#2a2a2a" stroke-width="1"/>
  <text x="125" y="132" text-anchor="middle" font-size="13" font-weight="700" fill="#e0e0e0">PDF Docs</text>
  <text x="125" y="152" text-anchor="middle" font-size="10" fill="#555">docs/ folder</text>

  <!-- arrow -->
  <line x1="190" y1="136" x2="216" y2="136" stroke="#4d4d4d" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- Chunk+Embed -->
  <rect x="218" y="104" width="130" height="64" rx="8" fill="#181818" stroke="#2a2a2a" stroke-width="1"/>
  <text x="283" y="132" text-anchor="middle" font-size="13" font-weight="700" fill="#e0e0e0">Chunk+Embed</text>
  <text x="283" y="152" text-anchor="middle" font-size="10" fill="#555">MiniLM-L6-v2</text>

  <!-- arrow -->
  <line x1="348" y1="136" x2="374" y2="136" stroke="#4d4d4d" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- ChromaDB (green border) -->
  <rect x="376" y="100" width="130" height="72" rx="8" fill="#0d1a12" stroke="#1db954" stroke-width="1.5"/>
  <text x="441" y="132" text-anchor="middle" font-size="13" font-weight="700" fill="#1ed760">ChromaDB</text>
  <text x="441" y="152" text-anchor="middle" font-size="10" fill="#555">Vector Store</text>

  <!-- ── RUNTIME BOXES ── -->
  <!-- Audio In -->
  <rect x="460" y="104" width="110" height="64" rx="8" fill="#1a1f2e" stroke="#2a3040" stroke-width="1"/>
  <text x="515" y="132" text-anchor="middle" font-size="13" font-weight="700" fill="#e0e0e0">Audio In</text>
  <text x="515" y="152" text-anchor="middle" font-size="10" fill="#555">WAV/MP3</text>

  <!-- arrow -->
  <line x1="570" y1="136" x2="594" y2="136" stroke="#4d4d4d" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- Whisper -->
  <rect x="596" y="104" width="110" height="64" rx="8" fill="#1a1f2e" stroke="#2a3040" stroke-width="1"/>
  <text x="651" y="132" text-anchor="middle" font-size="13" font-weight="700" fill="#e0e0e0">Whisper</text>
  <text x="651" y="152" text-anchor="middle" font-size="10" fill="#555">STT medium</text>

  <!-- arrow -->
  <line x1="706" y1="136" x2="730" y2="136" stroke="#4d4d4d" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- Decision -->
  <rect x="732" y="104" width="110" height="64" rx="8" fill="#1a1f2e" stroke="#2a3040" stroke-width="1"/>
  <text x="787" y="128" text-anchor="middle" font-size="13" font-weight="700" fill="#e0e0e0">Decision</text>
  <text x="787" y="148" text-anchor="middle" font-size="10" fill="#555">RAG or LLM?</text>

  <!-- arrow right to Ollama -->
  <line x1="842" y1="136" x2="868" y2="136" stroke="#4d4d4d" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- Ollama LLM -->
  <rect x="732" y="248" width="200" height="72" rx="8" fill="#0d1220" stroke="#2a3040" stroke-width="1"/>
  <text x="832" y="280" text-anchor="middle" font-size="13" font-weight="700" fill="#e0e0e0">Ollama LLM</text>
  <text x="832" y="300" text-anchor="middle" font-size="10" fill="#555">llama3.2:1b</text>

  <!-- Decision → RAG (down arrow) -->
  <line x1="787" y1="168" x2="787" y2="230" stroke="#1ed760" stroke-width="1.2" marker-end="url(#arrg)"/>
  <text x="796" y="208" font-size="9" font-weight="700" fill="#1ed760">RAG</text>

  <!-- Retrieve box (green) -->
  <rect x="732" y="232" width="130" height="72" rx="8" fill="#0d1a12" stroke="#1db954" stroke-width="1.8"/>
  <text x="797" y="264" text-anchor="middle" font-size="13" font-weight="700" fill="#1ed760">Retrieve</text>
  <text x="797" y="284" text-anchor="middle" font-size="10" fill="#555">Top-5 chunks</text>

  <!-- ChromaDB dashed line down then right to Retrieve -->
  <path d="M441 172 L441 268 L730 268" fill="none" stroke="#1ed760" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#arrg)"/>

  <!-- Retrieve → Ollama (right arrow) -->
  <line x1="862" y1="268" x2="862" y2="250" stroke="#1ed760" stroke-width="1.2" marker-end="url(#arrg)"/>

  <!-- Decision → Ollama direct (right path for LLM mode) -->
  <path d="M870 136 L900 136 L900 284 L934 284" fill="none" stroke="#4d4d4d" stroke-width="1" stroke-dasharray="4 3"/>

  <!-- JSON Answer label -->
  <text x="832" y="360" text-anchor="middle" font-size="11" font-weight="700" fill="#1ed760">JSON Answer ↑</text>
  <line x1="832" y1="320" x2="832" y2="348" stroke="#1ed760" stroke-width="1.2" marker-end="url(#arrg)"/>

</svg>
